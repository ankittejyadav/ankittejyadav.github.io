name: Sync GitHub Projects

on:
  repository_dispatch:
    types: [portfolio_update]
  schedule:
    # Weekly Sunday midnight UTC fallback
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Sync Script
        run: node scripts/sync-projects.mjs
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Commit and Push Changes
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/projects/
          git diff --staged --quiet || (git commit -m "chore: sync project markdown files" && git push https://x-access-token:${GH_PAT}@github.com/ankittejyadav/ankittejyadav.github.io.git HEAD:main)

      - name: Generate Profile README
        run: node scripts/generate-profile-readme.mjs

      - name: Update GitHub Profile README
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # Clone the profile repo
          git clone https://x-access-token:${GH_PAT}@github.com/ankittejyadav/ankittejyadav.git /tmp/profile-repo

          # Copy generated README
          cp scripts/output/profile-readme.md /tmp/profile-repo/README.md

          # Check if anything changed
          cd /tmp/profile-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || (git commit -m "chore: auto-update profile README" && git push)


